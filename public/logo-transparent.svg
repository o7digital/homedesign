<svg width="300" height="80" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Icône de maison stylisée -->
  <g transform="translate(10, 10)">
    <!-- Toit -->
    <path d="M 30 10 L 50 25 L 10 25 Z" fill="none" stroke="white" stroke-width="2" stroke-linejoin="miter"/>
    <!-- Murs -->
    <rect x="15" y="25" width="30" height="25" fill="none" stroke="white" stroke-width="2"/>
    <!-- Porte -->
    <rect x="23" y="35" width="14" height="15" fill="none" stroke="white" stroke-width="1.5"/>
    <!-- Toit avec détails -->
    <line x1="10" y1="25" x2="50" y2="25" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Texte "Home Design" -->
  <text x="70" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">Home Design</text>
  
  <!-- Texte "Marques" -->
  <text x="70" y="55" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="white">Marques</text>
</svg>
